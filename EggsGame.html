<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guess the Number of Eggs</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Trebuchet MS', sans-serif;
      background: #6fbaff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game {
      text-align: center;
      background: rgba(255, 255, 255, 0.8);
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    }

    h1 {
      margin-top: 0;
      font-size: 2.2rem;
    }

    p {
      margin: 8px 0;
    }

    input[type="number"] {
      width: 60px;
      padding: 8px;
      font-size: 1.2rem;
      text-align: center;
      border-radius: 8px;
      border: 1px solid #999;
      margin-top: 10px;
    }

    button {
      margin-top: 12px;
      padding: 8px 18px;
      border-radius: 14px;
      border: none;
      background: #18e0b5;
      color: #003333;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #12c79f;
    }

    #playAgain {
      margin-left: 10px;
      background: #ffd95a;
    }

    #playAgain:hover {
      background: #f4c93d;
    }

    #message {
      margin-top: 16px;
      min-height: 1.2em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Guess the Number of Eggs</h1>
    <p>Pick a number between 1 and 10</p>

    <input id="eggGuess" type="number" min="1" max="10" />
    <div>
      <button id="checkEgg">Check</button>
      <button id="playAgain">Play Again</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="EggsGame.js"></script>
</body>
</html>
